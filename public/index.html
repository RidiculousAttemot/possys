<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPOS - POS System</title>
    <link rel="stylesheet" href="css/redirect.css">
    <script src="js/authGuard.js" defer></script>
    <script src="js/auditTracker.js" defer></script>
    <script>
        // Authentication checks on page load
        window.onload = async function() {
            const authToken = localStorage.getItem('authToken');

            if (!authToken) {
                console.log('No authentication token found. Redirecting to login page...');
                window.location.href = 'login.html';
                return;
            }

            if (window.AuthGuard) {
                const session = await window.AuthGuard.validateSession();

                if (!session.valid) {
                    window.AuthGuard.redirectToLogin();
                    return;
                }

                window.AuthGuard.redirectByRole(session.user);
                return;
            }

            window.location.href = localStorage.getItem('userRole') === 'admin' ? 'admin.html' : 'pos.html';
        }
    </script>
</head>
<body data-page="redirect">
    <div class="redirect-container">
        <div class="redirect-content">
            <div class="spinner"></div>
            <h2>Checking Authentication...</h2>
            <p>Please wait while we verify your credentials.</p>
        </div>
    </div>
</body>
</html>
